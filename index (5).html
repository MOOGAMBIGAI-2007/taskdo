<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskDo - To-Do List</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --border: #d9dbe9;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --success: #16a34a;
      --danger: #ef4444;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, #f7f8fc 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .app-header {
      padding: 32px 32px 16px;
      border-bottom: 1px solid var(--border);
    }

    .app-header h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 3vw, 2.6rem);
      letter-spacing: -0.05em;
    }

    .app-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .task-form {
      display: flex;
      gap: 12px;
      margin: 24px 0 0;
    }

    .task-form input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .task-form input:focus {
      border-color: var(--accent);
    }

    .task-form button {
      border: none;
      background: var(--accent);
      color: white;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .task-form button:hover {
      background: #1d4ed8;
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease;
    }

    .task-item:nth-child(odd) {
      background: #fbfbff;
    }

    .task-item.completed {
      opacity: 0.7;
    }

    .task-item .task-title {
      margin: 0;
      font-size: 1rem;
      color: var(--text);
      word-break: break-word;
    }

    .task-item .task-title.completed {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-actions {
      display: flex;
      gap: 10px;
    }

    .task-actions button {
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .task-actions button:hover {
      background: rgba(37, 99, 235, 0.08);
      color: var(--accent);
    }

    .task-actions button.delete {
      color: var(--danger);
    }

    .task-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filters button {
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 999px;
      padding: 10px 16px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .filters button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .task-list.empty::before {
      content: "No tasks yet. Add one to get started.";
      display: block;
      padding: 40px 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 600px) {
      .task-item {
        grid-template-columns: auto 1fr;
      }

      .task-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="TaskDo To-Do application">
    <section class="app-header">
      <h1>TaskDo</h1>
      <p>Manage your tasks with full create, edit, delete, complete, and filtered views. Your list stays saved between visits.</p>
      <form class="task-form" id="task-form" autocomplete="off">
        <label for="new-task" class="visually-hidden">Add new task</label>
        <input id="new-task" type="text" placeholder="Add a new task..." aria-label="New task" />
        <button type="submit">Add</button>
      </form>
    </section>

    <ul class="task-list" id="task-list" aria-live="polite"></ul>

    <div class="task-meta">
      <span id="task-count">0 tasks left</span>
      <div class="filters" role="group" aria-label="Task filters">
        <button type="button" data-filter="all" class="filter-button active">All</button>
        <button type="button" data-filter="active" class="filter-button">Active</button>
        <button type="button" data-filter="completed" class="filter-button">Completed</button>
      </div>
      <button type="button" id="clear-completed" class="clear-button">Clear Completed</button>
    </div>
  </main>

  <script>
    const storageKey = 'taskdo-tasks';
    const taskForm = document.getElementById('task-form');
    const taskInput = document.getElementById('new-task');
    const taskList = document.getElementById('task-list');
    const taskCount = document.getElementById('task-count');
    const filters = document.querySelectorAll('.filter-button');
    const clearCompletedButton = document.getElementById('clear-completed');

    let tasks = [];
    let currentFilter = 'all';

    function loadTasks() {
      const saved = window.localStorage.getItem(storageKey);
      if (!saved) return;
      try {
        tasks = JSON.parse(saved) || [];
      } catch (error) {
        console.error('Failed to parse tasks from localStorage:', error);
        tasks = [];
      }
    }

    function saveTasks() {
      window.localStorage.setItem(storageKey, JSON.stringify(tasks));
    }

    function createTask(title) {
      return {
        id: Date.now().toString(),
        title: title.trim(),
        completed: false,
      };
    }

    function getFilteredTasks() {
      if (currentFilter === 'active') {
        return tasks.filter(task => !task.completed);
      }
      if (currentFilter === 'completed') {
        return tasks.filter(task => task.completed);
      }
      return tasks;
    }

    function renderTasks() {
      const filtered = getFilteredTasks();
      taskList.innerHTML = '';

      if (filtered.length === 0) {
        taskList.classList.add('empty');
      } else {
        taskList.classList.remove('empty');
      }

      filtered.forEach(task => {
        const item = document.createElement('li');
        item.className = 'task-item' + (task.completed ? ' completed' : '');
        item.dataset.id = task.id;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'task-toggle';
        checkbox.checked = task.completed;
        checkbox.setAttribute('aria-label', 'Toggle task completion');

        const title = document.createElement('p');
        title.className = 'task-title' + (task.completed ? ' completed' : '');
        title.textContent = task.title;
        title.tabIndex = 0;
        title.dataset.action = 'edit';
        title.setAttribute('role', 'button');
        title.setAttribute('aria-label', 'Edit task');

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        const editButton = document.createElement('button');
        editButton.type = 'button';
        editButton.dataset.action = 'edit';
        editButton.textContent = 'Edit';

        const deleteButton = document.createElement('button');
        deleteButton.type = 'button';
        deleteButton.dataset.action = 'delete';
        deleteButton.className = 'delete';
        deleteButton.textContent = 'Delete';

        actions.append(editButton, deleteButton);
        item.append(checkbox, title, actions);
        taskList.append(item);
      });

      updateMeta();
    }

    function updateMeta() {
      const activeCount = tasks.filter(task => !task.completed).length;
      taskCount.textContent = `${activeCount} task${activeCount === 1 ? '' : 's'} left`;
      clearCompletedButton.disabled = tasks.every(task => !task.completed);
    }

    function addTask(title) {
      if (!title.trim()) return;
      tasks.unshift(createTask(title));
      saveTasks();
      renderTasks();
      taskInput.value = '';
      taskInput.focus();
    }

    function toggleTask(id) {
      const task = tasks.find(task => task.id === id);
      if (!task) return;
      task.completed = !task.completed;
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function editTask(id) {
      const task = tasks.find(task => task.id === id);
      if (!task) return;
      const newTitle = window.prompt('Edit task title', task.title);
      if (newTitle === null) return;
      if (!newTitle.trim()) {
        return;
      }
      task.title = newTitle.trim();
      saveTasks();
      renderTasks();
    }

    function changeFilter(filter) {
      currentFilter = filter;
      filters.forEach(button => {
        button.classList.toggle('active', button.dataset.filter === filter);
      });
      renderTasks();
    }

    taskForm.addEventListener('submit', event => {
      event.preventDefault();
      addTask(taskInput.value);
    });

    taskList.addEventListener('click', event => {
      const item = event.target.closest('.task-item');
      if (!item) return;
      const id = item.dataset.id;

      if (event.target.matches('.task-toggle')) {
        toggleTask(id);
        return;
      }

      const action = event.target.dataset.action;
      if (action === 'edit') {
        editTask(id);
      }
      if (action === 'delete') {
        deleteTask(id);
      }
    });

    taskList.addEventListener('keydown', event => {
      if (event.target.dataset.action !== 'edit') return;
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        const item = event.target.closest('.task-item');
        if (item) {
          editTask(item.dataset.id);
        }
      }
    });

    filters.forEach(button => {
      button.addEventListener('click', () => changeFilter(button.dataset.filter));
    });

    clearCompletedButton.addEventListener('click', () => {
      tasks = tasks.filter(task => !task.completed);
      saveTasks();
      renderTasks();
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
