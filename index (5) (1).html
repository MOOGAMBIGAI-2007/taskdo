<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Board</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #efefec;
      --text-primary: #1a1a18; --text-secondary: #6b6b68; --text-tertiary: #9e9e9a;
      --border-tertiary: rgba(0,0,0,0.10); --border-secondary: rgba(0,0,0,0.20);
      --radius-md: 8px; --radius-lg: 12px;
      --purple-main: #7F77DD; --purple-dark: #534AB7; --purple-light: #EEEDFE;
      --purple-border: #AFA9EC; --purple-text: #534AB7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c; --bg-secondary: #2a2a28; --bg-tertiary: #141412;
        --text-primary: #f0ede8; --text-secondary: #9e9e9a; --text-tertiary: #6b6b68;
        --border-tertiary: rgba(255,255,255,0.10); --border-secondary: rgba(255,255,255,0.20);
        --purple-light: #26215C; --purple-border: #3C3489; --purple-text: #AFA9EC;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 2rem 1rem; }
    .app { max-width: 640px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 26px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .header p { font-size: 14px; color: var(--text-secondary); }
    .input-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .input-row input[type="text"] { flex: 1; height: 42px; padding: 0 14px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); font-size: 14px; font-family: inherit; background: var(--bg-primary); color: var(--text-primary); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .input-row input[type="text"]:focus { border-color: var(--purple-main); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
    .input-row input[type="text"]::placeholder { color: var(--text-tertiary); }
    .priority-select { height: 42px; padding: 0 10px; border: 0.5px solid var(--border-secondary); border-radius: var(--radius-md); font-size: 13px; font-family: inherit; background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; outline: none; }
    .btn-add { height: 42px; padding: 0 18px; background: var(--purple-main); color: #fff; border: none; border-radius: var(--radius-md); font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: background 0.15s; }
    .btn-add:hover { background: var(--purple-dark); }
    .btn-add:active { transform: scale(0.97); }
    .stats-row { display: flex; gap: 12px; margin-bottom: 1.25rem; }
    .stat { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px 16px; flex: 1; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .bulk-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .filters { display: flex; gap: 4px; }
    .filter-btn { height: 32px; padding: 0 14px; background: transparent; border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-md); font-size: 13px; font-family: inherit; color: var(--text-secondary); cursor: pointer; transition: background 0.1s; }
    .filter-btn:hover { background: var(--bg-secondary); }
    .filter-btn.active { background: var(--purple-light); color: var(--purple-text); border-color: var(--purple-border); font-weight: 500; }
    .btn-clear { font-size: 13px; color: var(--text-secondary); background: none; border: none; cursor: pointer; padding: 4px 0; font-family: inherit; }
    .btn-clear:hover { color: #A32D2D; }
    .todo-list { display: flex; flex-direction: column; gap: 6px; }
    .todo-item { background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); border-radius: var(--radius-lg); padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.15s ease; transition: opacity 0.14s, transform 0.14s; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .todo-item.completed { opacity: 0.55; }
    .todo-checkbox { width: 20px; height: 20px; border: 1.5px solid var(--border-secondary); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.1s, background 0.1s; }
    .todo-checkbox:hover { border-color: var(--purple-main); }
    .todo-checkbox.checked { background: var(--purple-main); border-color: var(--purple-main); }
    .todo-checkbox.checked::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); display: block; }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .p-high { background: #E24B4A; } .p-med { background: #EF9F27; } .p-low { background: #1D9E75; }
    .todo-text { flex: 1; font-size: 14px; color: var(--text-primary); line-height: 1.5; word-break: break-word; }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-tertiary); }
    .todo-edit-input { flex: 1; font-size: 14px; font-family: inherit; color: var(--text-primary); background: var(--bg-secondary); border: 0.5px solid var(--purple-main); border-radius: 6px; padding: 3px 10px; height: 30px; outline: none; }
    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.12s; }
    .todo-item:hover .todo-actions { opacity: 1; }
    .todo-actions.visible { opacity: 1; }
    .icon-btn { width: 28px; height: 28px; border: none; background: transparent; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 16px; transition: background 0.1s, color 0.1s; }
    .icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .icon-btn.danger:hover { background: #FCEBEB; color: #A32D2D; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-secondary); }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 12px; opacity: 0.35; }
    .empty-state .empty-title { font-size: 15px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
    .empty-state .empty-sub { font-size: 13px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Task board</h1>
    <p>Your tasks are saved automatically in this browser</p>
  </div>
  <div class="input-row">
    <input type="text" id="new-task" placeholder="What needs to be done?" maxlength="200" />
    <select class="priority-select" id="new-priority">
      <option value="low">🟢 Low</option>
      <option value="med" selected>🟡 Med</option>
      <option value="high">🔴 High</option>
    </select>
    <button class="btn-add" id="add-btn">+ Add task</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num" id="stat-active">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Done</div></div>
  </div>
  <div class="bulk-row">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
    <button class="btn-clear" id="clear-done">Clear completed</button>
  </div>
  <div class="todo-list" id="todo-list"></div>
</div>
<script>
  let tasks = [], filter = 'all', editingId = null;
  const STORAGE_KEY = 'todo_app_v1';
  function loadFromStorage() { try { const r = localStorage.getItem(STORAGE_KEY); tasks = r ? JSON.parse(r) : []; } catch(e) { tasks = []; } }
  function saveToStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {} }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function priorityClass(p) { return p==='high'?'p-high':p==='med'?'p-med':'p-low'; }
  function addTask(text, priority) { if (!text.trim()) return; tasks.unshift({id:uid(),text:text.trim(),done:false,priority:priority||'med',created:Date.now()}); saveToStorage(); render(); }
  function toggleTask(id) { const t=tasks.find(t=>t.id===id); if(t){t.done=!t.done;saveToStorage();render();} }
  function saveEdit(id, val) { const t=tasks.find(t=>t.id===id); if(t&&val.trim())t.text=val.trim(); editingId=null; saveToStorage(); render(); }
  function deleteTask(id) { const el=document.querySelector(`.todo-item[data-id="${id}"]`); if(el){el.style.opacity='0';el.style.transform='translateX(16px)';el.style.transition='all 0.14s';} setTimeout(()=>{tasks=tasks.filter(t=>t.id!==id);saveToStorage();render();},140); }
  function clearCompleted() { tasks=tasks.filter(t=>!t.done); saveToStorage(); render(); }
  function getVisibleTasks() { if(filter==='active')return tasks.filter(t=>!t.done); if(filter==='completed')return tasks.filter(t=>t.done); return tasks; }
  function render() {
    const total=tasks.length, done=tasks.filter(t=>t.done).length;
    document.getElementById('stat-total').textContent=total;
    document.getElementById('stat-active').textContent=total-done;
    document.getElementById('stat-done').textContent=done;
    const visible=getVisibleTasks(), list=document.getElementById('todo-list');
    if(!visible.length){const m={all:['No tasks yet','Add your first task above.'],active:['All caught up!','No active tasks.'],completed:['Nothing completed yet','Finish some tasks first.']}; const[t,s]=m[filter]; list.innerHTML=`<div class="empty-state"><i>✓</i><p class="empty-title">${t}</p><p class="empty-sub">${s}</p></div>`; return;}
    list.innerHTML=visible.map(task=>{
      if(editingId===task.id) return `<div class="todo-item" data-id="${task.id}"><div class="todo-checkbox ${task.done?'checked':''}" data-action="toggle" data-id="${task.id}"></div><input class="todo-edit-input" value="${escapeHtml(task.text)}" data-edit-id="${task.id}" maxlength="200"/><div class="todo-actions visible"><button class="icon-btn" data-action="save-edit" data-id="${task.id}">✓</button><button class="icon-btn" data-action="cancel-edit">✕</button></div></div>`;
      return `<div class="todo-item ${task.done?'completed':''}" data-id="${task.id}"><div class="todo-checkbox ${task.done?'checked':''}" data-action="toggle" data-id="${task.id}"></div><div class="priority-dot ${priorityClass(task.priority)}"></div><span class="todo-text">${escapeHtml(task.text)}</span><div class="todo-actions"><button class="icon-btn" data-action="edit" data-id="${task.id}">✏</button><button class="icon-btn danger" data-action="delete" data-id="${task.id}">🗑</button></div></div>`;
    }).join('');
  }
  document.getElementById('add-btn').addEventListener('click',()=>{const i=document.getElementById('new-task'),p=document.getElementById('new-priority').value;addTask(i.value,p);i.value='';i.focus();});
  document.getElementById('new-task').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-btn').click();});
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{filter=btn.dataset.filter;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b===btn));render();}));
  document.getElementById('clear-done').addEventListener('click',clearCompleted);
  document.getElementById('todo-list').addEventListener('click',e=>{const a=e.target.closest('[data-action]');if(!a)return;const{action,id}=a.dataset;if(action==='toggle')toggleTask(id);else if(action==='edit'){editingId=id;render();const i=document.querySelector('.todo-edit-input');if(i){i.focus();i.select();}}else if(action==='delete')deleteTask(id);else if(action==='save-edit'){const i=document.querySelector('.todo-edit-input');saveEdit(id,i?i.value:'');}else if(action==='cancel-edit'){editingId=null;render();}});
  document.getElementById('todo-list').addEventListener('keydown',e=>{if(!e.target.classList.contains('todo-edit-input'))return;const id=e.target.dataset.editId;if(e.key==='Enter')saveEdit(id,e.target.value);if(e.key==='Escape'){editingId=null;render();}});
  loadFromStorage(); render();
</script>
</body>
</html>
